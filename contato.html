<!DOCTYPE html>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="container">
    <a href="index.html" class="logo">ABSOLUTE CINEMA</a>

<main>
  <h1>Contato</h1>
  <p class="subtitulo">Entre em contato com a equipe do Absolute Cinema.</p>

  <h2>Envie sua Mensagem</h2>
  <form action="#" method="post">
    <div class="campo">
      <label for="nome">Nome de Usuário</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome de usuário" required>
    </div>

    <div class="campo">
      <label for="data">Data</label>
      <input type="date" id="data" name="data" required>
    </div>

    <div class="campo">
      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui..." required></textarea>
    </div>

    <button type="submit" class="botao">Enviar</button>
  </form>
</main>

<footer>
  <p>Absolute Cinema 2026 - Locadora de Filmes</p>
  <p>Por Ricardo Bessa.</p>
</footer>

</body>
</html>
